name: SwipeDating
options:
  bundleIdPrefix: org.example.localfirstdating
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
targets:
  SwipeDating:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Sources
      - path: Generated
        includes:
          - "*.swift"
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.example.localfirstdating.staging
        PRODUCT_NAME: SwipeDating
        INFOPLIST_FILE: App/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) DATING_UNIFFI_LINKED"
        LIBRARY_SEARCH_PATHS: "$(inherited) $(SRCROOT)/Native/lib"
        HEADER_SEARCH_PATHS: "$(inherited) $(SRCROOT)/Generated"
        SWIFT_INCLUDE_PATHS: "$(inherited) $(SRCROOT)/Generated"
        OTHER_SWIFT_FLAGS: "$(inherited) -Xcc -fmodule-map-file=$(SRCROOT)/Generated/dating_uniffi_bindingsFFI.modulemap"
        OTHER_LDFLAGS: "$(inherited) -force_load $(SRCROOT)/Native/lib/libdating_uniffi_bindings.a -framework Security -framework SystemConfiguration"
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
    scheme:
      testTargets: []
