[advisories]
unmaintained = "workspace"
unsound = "workspace"
yanked = "deny"
ignore = []

[licenses]
confidence-threshold = 0.8
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "MPL-2.0",
  "Zlib",
  "CC0-1.0",
  "Apache-2.0 WITH LLVM-exception",
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "warn"
