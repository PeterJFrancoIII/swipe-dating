name: One-time sync adult feature branch with main

on:
  push:
    branches:
      - agent/adult-consent-features
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge-main:
    if: github.event.head_commit.message != 'chore: merge main into adult consent feature branch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/adult-consent-features
          fetch-depth: 0
          persist-credentials: true

      - name: Merge main and resolve only reviewed overlaps
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main

          if git merge-base --is-ancestor origin/main HEAD; then
            echo "main is already an ancestor"
            exit 0
          fi

          set +e
          git merge --no-commit --no-ff origin/main
          merge_status=$?
          set -e

          if [[ ${merge_status} -ne 0 ]]; then
            conflicts="$(git diff --name-only --diff-filter=U)"
            unexpected="$(printf '%s\n' "${conflicts}" | grep -Ev '^(Makefile|README\.md)$' || true)"
            if [[ -n "${unexpected}" ]]; then
              echo "Unexpected conflicts:" >&2
              printf '%s\n' "${unexpected}" >&2
              git merge --abort
              exit 1
            fi

            # The feature versions already include main's RAM-disk additions plus
            # the new blocking policy/mobile targets.
            git checkout --ours Makefile README.md
            git add Makefile README.md
          fi

          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "Unresolved conflicts remain" >&2
            git diff --name-only --diff-filter=U >&2
            git merge --abort
            exit 1
          fi

          git add docs/operations/ramdisk.md scripts/ramdisk.sh 2>/dev/null || true
          git commit -m "chore: merge main into adult consent feature branch"
          git push origin HEAD:agent/adult-consent-features
