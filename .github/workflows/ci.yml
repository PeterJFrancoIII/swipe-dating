name: JavaScript R&D CI

on:
  push:
    branches: [main, agent/**, feat/**]
  pull_request:

permissions:
  contents: read

concurrency:
  group: javascript-rnd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  language-audit:
    name: Repository implementation must be JavaScript-only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/check-javascript-only-repository.mjs
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: javascript-only-violations
          path: .javascript-only-violations.json

  javascript:
    name: JavaScript-only repository, domain, API, storage, discovery, conversations, relationship phases, simulation, and active-surface checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install --ignore-scripts
      - run: npm run check

  mobile-web:
    name: Expo SDK 57 web export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install --ignore-scripts
      - run: npm run mobile:export:web
        env:
          CI: '1'
      - run: test -s apps/rnd-mobile/dist-web/index.html

  governance:
    name: JavaScript governance and consent contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: node scripts/check-governance-contracts.mjs
      - run: node scripts/check-active-javascript-surface.mjs

  production-gate:
    name: Production preflight must remain blocked
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: node scripts/verify-production-block.mjs
