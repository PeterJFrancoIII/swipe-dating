name: CI

on:
  push:
    branches: [main, "feat/**", "agent/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  feature-policy:
    name: Adult consent feature policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce source and governance invariants
        run: bash scripts/feature_policy_check.sh

  rust:
    name: Rust fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Unit and integration tests
        run: cargo test --workspace

  command-integrity:
    name: Deploy command integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify SHA-256
        run: bash scripts/command_integrity_check.sh

  android:
    name: Android assembleDebug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Assemble staging APK
        run: |
          chmod +x apps/android/gradlew
          cd apps/android
          ./gradlew :app:assembleDebug --no-daemon
      - name: Verify APK exists
        run: test -s apps/android/app/build/outputs/apk/debug/app-debug.apk

  ios:
    name: iOS Simulator build with UniFFI
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Build current iOS staging app
        run: make ios-build

  production-gate:
    name: Production preflight must block
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify missing approvals fail closed
        run: |
          if bash scripts/production_preflight.sh; then
            echo "ERROR: production-preflight should have blocked"
            exit 1
          fi
          echo "OK: PRODUCTION_BLOCKED_HUMAN_APPROVALS_REQUIRED (expected)"
