name: CI

on:
  push:
    branches: [main, feat/**, agent/**]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Unit and integration tests
        run: cargo test --workspace
      - name: Alignment tests
        run: cargo test -p dating-matching alignment -- --nocapture
      - name: Preference tests
        run: cargo test -p dating-matching preferences -- --nocapture
      - name: Proximity tests
        run: cargo test -p dating-matching proximity -- --nocapture
      - name: Location grant tests
        run: cargo test -p dating-matching location_share -- --nocapture
      - name: Anti-abuse tests
        run: cargo test -p dating-safety anti_abuse -- --nocapture
      - name: Skin Shop boundary tests
        run: cargo test -p dating-profile skin_shop -- --nocapture

  questionnaire-and-governance:
    name: Questionnaire / governance contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate questionnaire JSON
        run: python -m json.tool config/alignment-questionnaire-v1.json >/dev/null
      - name: Required adult and consent contracts
        shell: bash
        run: |
          set -euo pipefail
          grep -Fq 'adults-only' MISSION.md
          grep -Fq 'No person under 18' policies/community-rules.md
          grep -Fq 'Identical privacy defaults for every gender' docs/governance/release-gates.md
          grep -Fq 'Purchases never affect dating rank' docs/governance/release-gates.md
          grep -Fq 'autoMatchOnLike: false' apps/ios/Sources/AppModel.swift
          grep -Fq 'return nil' apps/ios/Sources/AppModel.swift
          test -f apps/ios/Sources/AppModel+AdultEligibility.swift
          test -f core/matching/src/proximity.rs
          test -f core/matching/src/location_share.rs
          test -f core/safety/src/anti_abuse.rs
          test -f core/profile/src/skin_shop.rs
          test -f docs/architecture/adr-0009-consent-based-proximity.md
          test -f docs/architecture/adr-0010-matched-location-sharing.md
          test -f docs/architecture/adr-0011-local-sensitive-alignment.md
          test -f docs/architecture/adr-0012-skin-shop-boundary.md
          test -f docs/architecture/adr-0013-bot-sybil-resistance.md
      - name: No executable marketplace asset formats in allowlist
        shell: bash
        run: |
          set -euo pipefail
          ! grep -Eiq 'allow(list|ed).*(javascript|executable plugin|arbitrary html)' docs/product/adult-feature-expansion.md
          ! grep -Eiq '"(text/html|application/javascript|text/javascript)"' core/profile/src/skin_shop.rs

  command-integrity:
    name: Deploy command integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify SHA-256
        run: bash scripts/command_integrity_check.sh

  android:
    name: Android assembleDebug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Assemble staging app
        working-directory: apps/android
        run: ./gradlew --no-daemon :app:assembleDebug
      - name: Verify artifact
        run: test -s apps/android/app/build/outputs/apk/debug/app-debug.apk

  ios-swift-package:
    name: iOS Swift source build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Swift package build
        working-directory: apps/ios
        run: swift build

  ios-xcode:
    name: iOS Simulator Xcode build with UniFFI
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Build app and linked Rust core
        run: make ios-build

  production-gate:
    name: Production preflight (must fail without approvals)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: production-preflight must block
        shell: bash
        run: |
          set -euo pipefail
          set +e
          output="$(bash scripts/production_preflight.sh 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output"
          if [[ $status -eq 0 ]]; then
            echo "ERROR: production-preflight should have blocked"
            exit 1
          fi
          grep -Fq 'PRODUCTION_BLOCKED_HUMAN_APPROVALS_REQUIRED' <<<"$output"
          echo "OK: production remains human-gated"
